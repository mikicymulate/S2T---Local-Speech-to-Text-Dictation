[mypy]
python_version = 3.13
files = main.py, s2t
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True

# Third-party libraries that ship no type information.
[mypy-sounddevice.*]
ignore_missing_imports = True

[mypy-keyboard.*]
ignore_missing_imports = True

[mypy-pyperclip.*]
ignore_missing_imports = True

[mypy-pystray.*]
ignore_missing_imports = True

[mypy-faster_whisper.*]
ignore_missing_imports = True
